name: Render SMS vs Push

on:
  workflow_dispatch:
    inputs:
      brand:
        description: Brand slug
        required: true
        default: lola

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: |
          cd .github/scripts
          npm init -y --silent
          npm i playwright --silent
          npx playwright install --with-deps chromium
      - name: Generate render script
        run: |
          python3 .github/scripts/patch.py
          python3 .github/scripts/patch2.py
          python3 .github/scripts/patch3.py
          python3 .github/scripts/patch4.py
      - name: Render
        run: cd .github/scripts && node render-final.js ${{ inputs.brand }}
      - name: Copy output
        run: mv .github/scripts/mockup-output ./mockup-output
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sms-vs-push-${{ inputs.brand }}
          path: mockup-output/*
          retention-days: 7
      - name: Create release
        run: |
          file=$(ls mockup-output/*.png | head -1)
          tag="${{ inputs.brand }}-v21-${{ github.run_number }}"
          gh release create "$tag" "$file" --title "SMS vs Push" --notes "CI render"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
