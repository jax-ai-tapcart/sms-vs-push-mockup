name: Render SMS vs Push

on:
  workflow_dispatch:
    inputs:
      brand:
        description: Brand slug (e.g. lola)
        required: true
        default: lola

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: |
          cd .github/scripts
          npm init -y --silent
          npm i playwright --silent
          npx playwright install --with-deps chromium
      - name: Patch scripts
        run: |
          sed -i 's|.*background: radial-gradient.*e*|  background: radial-gradient(ellipse at 50% 0%, #ff9e67 0%, #e14594 40%, #7b61ff 80%, transparent 100%);|' .github/scripts/render-push.js
          sed -i 's/height: 160px; object-fit: cover;/height: 220px; object-fit: cover;/' .github/scripts/render-push.js
          sed -i 's/margin: 40px;//' .github/scripts/render-push.js
          sed -i 's/Inter, sans-serif/\"SF Pro\", Inter, sans-serif/' .github/scripts/render-push.js
          sed -i 's/Inter, sans-serif/\"SF Pro\", Inter, sans-serif/' .github/scripts/render-sms.js
          sed -i 's/.content { flex: 1;/.content { flex: 0; margin-bottom: auto;/' .github/scripts/render-sms.js
      - name: Render SMS panel
        run: cd .github/scripts && node render-sms.js ${{ inputs.brand }}
      - name: Render Push panel
        run: cd .github/scripts && node render-push.js ${{ inputs.brand }}
      - name: Compose final PNG
        run: cd .github/scripts && node compose.js ${{ inputs.brand }}
      - name: Copy output
        run: mv .github/scripts/mockup-output ./mockup-output
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sms-vs-push-${{ inputs.brand }}
          path: mockup-output/*
          retention-days: 7
      - name: Create release
        run: |
          file=$(ls mockup-output/*.png | head -1)
          tag="${{ inputs.brand }}-v4-${{ github.run_number }}"
          gh release create "$tag" "$file" --title "SMS vs Push - ${{ inputs.brand }}" --notes "Rendered by CI"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
