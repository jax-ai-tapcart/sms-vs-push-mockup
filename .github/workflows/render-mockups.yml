name: Render SMS vs Push

on:
  workflow_dispatch:
    inputs:
      brand:
        description: Brand slug (e.g. lola)
        required: true
        default: lola

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: |
          cd .github/scripts
          npm init -y --silent
          npm i playwright --silent
          npx playwright install --with-deps chromium
      - name: Patch scripts
        run: |
          sed -i 's/background: #101010; border-radius: 52px;/background: #000; border-radius: 52px;/g' .github/scripts/render-sms.js
          sed -i 's/background: #101010; border-radius: 52px;/background: #000; border-radius: 52px;/g' .github/scripts/render-push.js
          sed -i 's/alotofastras 60%,//' .github/scripts/render-push.js
          sed -i 's/height: 160px; object-fit: cover;/height: 192px; object-fit: cover;/' .github/scripts/render-push.js
          sed -i 's/margin: 40px;//' .github/scripts/render-push.js
          sed -i 's/color: #007AFF; font-size: 13px; font-family: Inter; }/color: #FF3B30; font-size: 13px; font-family: Inter; }/' .github/scripts/render-sms.js
          sed -i 's/.phone-wrap/.phone/g' .github/scripts/render-push.js
          sed -i 's/height: 480px; overflow: hidden; border-radius: 52px 52px 0 0; flex-shrink: 0;/flex-shrink: 0;/' .github/scripts/compose.js
          sed -i 's/align-items: flex-start; gap: 40px;/align-items: center; gap: 60px;/' .github/scripts/compose.js
          sed -i 's/margin-top: 240px;//' .github/scripts/compose.js
      - name: Render SMS panel
        run: cd .github/scripts && node render-sms.js ${{ inputs.brand }}
      - name: Render Push panel
        run: cd .github/scripts && node render-push.js ${{ inputs.brand }}
      - name: Compose final PNG
        run: cd .github/scripts && node compose.js ${{ inputs.brand }}
      - name: Copy output
        run: mv .github/scripts/mockup-output ./mockup-output
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ inputs.brand }}-v3-${{ github.run_number }}
          name: SMS vs Push for ${{ inputs.brand }}
          artifacts: mockup-output/*
          allowUpdates: true
          token: ${{ secrets.GITHUB_TOKEN }}
