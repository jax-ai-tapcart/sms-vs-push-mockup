$name: Render SMS vs Push\n\non:\n  workflow_dispatch:\n    inputs:\n      brand:\n        description: Brand slug (e.g. lola)\n        required: true\n        default: lola\n\njobs:\n  render:\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - name: Setup Node\n        uses: actions/setup-node@v4\n        with:\n          node-version: 20\n      - name: Install deps\n        run: |\n          cd .github/scripts\n          npm init -y --silent\n          npm i playwright --silent\n          npx playwright install --with-deps chromium\n      - name: Patch scripts\n        working-directory: .github/scripts\n        run: python3 patch.py\n      - name: Render SMS panel\n        run: cd .github/scripts && node render-sms.js ${{inputs.brand}}\n      - name: Render Push panel\n        run: cd .github/scripts && node render-push.js ${{inputs.brand}}\n      - name: Compose final PNG\n        run: cd .github/scripts && node compose.js ${{inputs.brand}}\n      - name: Copy output\n        run: mv .github/scripts/mockup-output ./mockup-output\n      - name: Create release\n        uses: ncipollo/release-action@v1\n        with:\n          tag: ${{inputs.brand}}-v3-${{github.run_number}}\n          name: SMS vs Push for ${{inputs.brand}}\n          artifacts: mockup-output/*\n          allowUpdates: true\n          token: ${{secrets.GITHUB_TOKEN}}\n